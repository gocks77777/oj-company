<svg width="640" height="200" viewBox="0 0 640 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="O&amp;J Company logo (monochrome)">
  <!-- single-colour (white) version for print / 1-colour use. recolour by changing fill/stroke to currentColor if needed. -->

  <!-- ===== symbol ===== -->
  <g transform="translate(28,28) scale(0.28)">
    <!-- O : open ring -->
    <path d="M 360 132 A 156 156 0 1 1 256 100"
          fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
    <!-- node dot -->
    <circle cx="372" cy="150" r="22" fill="#ffffff"/>
    <!-- J : nested stem + hook -->
    <path d="M 296 160 L 296 300 A 54 54 0 0 1 188 300"
          fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="176" y="115" font-family="Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo',sans-serif"
        font-size="62" font-weight="800" letter-spacing="-1" fill="#ffffff">O&amp;J</text>

  <text x="178" y="150" font-family="Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="18" font-weight="600" letter-spacing="3.5" fill="#ffffff" fill-opacity="0.7">COMPANY</text>
</svg>
