<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="O&amp;J symbol">
  <defs>
    <linearGradient id="ojGrad" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#6ea8fe"/>
    </linearGradient>
    <linearGradient id="ojGradSoft" x1="256" y1="120" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8a6dff"/>
      <stop offset="1" stop-color="#6ea8fe"/>
    </linearGradient>
  </defs>

  <!-- rounded square plate -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#13161f"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#262b3a" stroke-width="1"/>

  <!-- O : open ring (the "connection" loop, with a gap = node/link opening) -->
  <!-- arc drawn as a thick stroked circle with a gap at the top-right -->
  <path d="M 360 132
           A 156 156 0 1 1 256 100"
        fill="none" stroke="url(#ojGrad)" stroke-width="40" stroke-linecap="round"/>

  <!-- node dot sitting in the ring's gap = the "&" connector / automation node -->
  <circle cx="372" cy="150" r="22" fill="url(#ojGradSoft)"/>
  <circle cx="372" cy="150" r="22" fill="none" stroke="#13161f" stroke-width="6"/>

  <!-- J : nested inside the ring. vertical stem + hook curving left at the bottom -->
  <path d="M 296 160
           L 296 300
           A 54 54 0 0 1 188 300"
        fill="none" stroke="url(#ojGradSoft)" stroke-width="40" stroke-linecap="round"/>
</svg>
